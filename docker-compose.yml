version: '3.8'

services:
  # MongoDB for local data persistence
  mongodb:
    image: mongo:latest
    container_name: sayrasphere-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # Mosquitto for local MQTT brokering
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: sayrasphere-mqtt
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # [Flex] Server Container
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sayrasphere-server
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
      - mosquitto
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sayrasphere
      - MQTT_BROKER=mqtt://mosquitto:1883
      - PORT=5000
    restart: unless-stopped

  # [Flex] Client Container (Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sayrasphere-client
    ports:
      - '80:80'
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped

volumes:
  mongo-data:
